<!DOCTYPE html>
<html>
<head>
  <title>Ledge ¶ - Community-based version of Scratch.</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #0D1117;
      color: #8b949e;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .box {
      max-width: 460px;
      width: 100%;
      border: 1px solid #21262d;
      padding: 28px 32px;
    }

    .tag {
      font-size: 12px;
      color: #56d364;
      letter-spacing: 1px;
      margin: 0 0 14px 0;
    }

    .tag::before {
      content: "● ";
    }

    h1 {
      font-size: 17px;
      font-weight: 500;
      color: #e6edf3;
      margin: 0 0 10px 0;
    }

    p {
      font-size: 13px;
      line-height: 1.6;
      margin: 0 0 26px 0;
    }

    form {
      display: flex;
      border: 1px solid #21262d;
      background: #010409;
    }

    input {
      flex: 1;
      background: transparent;
      border: none;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
    }

    input::placeholder {
      color: #484f58;
    }

    button {
      background: transparent;
      border: none;
      border-left: 1px solid #21262d;
      color: #8b949e;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 16px;
      cursor: pointer;
    }

    button:hover {
      color: #e6edf3;
      background: #161b22;
    }

    .foot {
      margin-top: 18px;
      font-size: 11px;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="box">
    <p class="tag">maintenance</p>
    <h1>Ledge &para;</h1>
    <p>This website is currently under maintenance and will be back up soon. Expect the best.</p>

    <form onsubmit="event.preventDefault(); handleScratchLink();">
      <input id="scratch-link-input" type="url" placeholder="paste a scratch project link" />
      <button type="submit">save</button>
    </form>

    <p class="foot" id="status"></p>
    <div id="embed-holder" style="margin-top: 14px;"></div>
  </div>

  <script>
    function handleScratchLink() {
      const input = document.getElementById('scratch-link-input');
      const status = document.getElementById('status');
      const embedHolder = document.getElementById('embed-holder');
      const link = input.value.trim();
      if (!link) return;

      var match = link.match(/scratch\.mit\.edu\/projects\/(\d+)/);

      if (!match) {
        status.textContent = 'that does not look like a scratch project link.';
        return;
      }

      var projectId = match[1];

      embedHolder.innerHTML = '<iframe src="https://scratch.mit.edu/projects/' + projectId + '/embed" width="100%" height="280" frameborder="0" allowtransparency="true"></iframe>';

      status.textContent = 'showing project ' + projectId;
      input.value = '';
    }
  </script>
</body>
</html>
